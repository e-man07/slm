---
version: "2.0"

services:
  inference:
    image: lmsysorg/sglang:v0.4.5.post2-cu124
    env:
      - "HUGGING_FACE_HUB_TOKEN=<REPLACE_ME>"
      - "HF_HOME=/root/.cache/huggingface"
    command:
      - "/bin/bash"
      - "-c"
      - "if [ ! -f /root/.cache/slm-solana-merged/config.json ]; then echo 'Merging LoRA into base model...' && python3 -m pip install -q accelerate && python3 -c \"from huggingface_hub import snapshot_download; snapshot_download('WhyParabola/sealevel-solana-lora', local_dir='/tmp/slm-lora'); print('LoRA downloaded')\" && python3 -c \"import accelerate; from transformers import AutoModelForCausalLM, AutoTokenizer; import torch, json; print('Loading base...'); tok = AutoTokenizer.from_pretrained('Qwen/Qwen2.5-Coder-7B-Instruct', trust_remote_code=True); model = AutoModelForCausalLM.from_pretrained('Qwen/Qwen2.5-Coder-7B-Instruct', torch_dtype=torch.bfloat16, device_map='auto', trust_remote_code=True); print('Loading LoRA weights...'); cfg = json.load(open('/tmp/slm-lora/adapter_config.json')); from safetensors.torch import load_file; lora_weights = load_file('/tmp/slm-lora/adapter_model.safetensors'); lora_a = {}; lora_b = {}; [lora_a.update({k.replace('.lora_A.weight',''): v}) if '.lora_A.' in k else lora_b.update({k.replace('.lora_B.weight',''): v}) if '.lora_B.' in k else None for k,v in lora_weights.items()]; alpha = cfg.get('lora_alpha', 64); r = cfg.get('r', 32); scale = alpha / r; print(f'Merging {len(lora_a)} LoRA layers (scale={scale})...'); sd = model.state_dict(); matched = 0; [exec('matched += 1', {'matched': matched}) or sd[k+chr(46)+'weight'].add_((lora_b[k].to(sd[k+chr(46)+'weight'].device) @ lora_a[k].to(sd[k+chr(46)+'weight'].device)) * scale) for k in lora_a if k in lora_b and k+chr(46)+'weight' in sd]; model.load_state_dict(sd); print('Saving merged model...'); model.save_pretrained('/root/.cache/slm-solana-merged'); tok.save_pretrained('/root/.cache/slm-solana-merged'); print('Merge done!')\" && echo 'Cleaning base model cache...' && rm -rf /root/.cache/huggingface/hub/models--Qwen--Qwen2.5-Coder-7B-Instruct; else echo 'Merged model found, skipping merge.'; fi && mkdir -p /tmp/flashinfer && export FLASHINFER_WORKSPACE_DIR=/tmp/flashinfer && python3 -m sglang.launch_server --model-path /root/.cache/slm-solana-merged --host 0.0.0.0 --port 30000 --tp 1 --context-length 32768 --mem-fraction-static 0.80 --served-model-name slm-solana --trust-remote-code"
    expose:
      - port: 30000
        as: 30000
        to:
          - service: litellm
          - service: rag-api
            global: true
    params:
      storage:
        models:
          mount: /root/.cache
          readOnly: false

  litellm:
    image: ghcr.io/berriai/litellm:main-v1.46.6
    env:
      - "LITELLM_MASTER_KEY=<REPLACE_ME>"
      - "LITELLM_LOG_LEVEL=INFO"
      - "DISABLE_SPEND_LOGS=true"
    command:
      - "/bin/bash"
      - "-c"
      - "python3 -c \"import json,os;open('/app/config.yaml','w').write(json.dumps({'model_list':[{'model_name':'slm-solana','litellm_params':{'model':'openai/slm-solana','api_base':'http://inference:30000/v1','api_key':'none','max_tokens':4096,'stream':False}}],'litellm_settings':{'drop_params':True,'set_verbose':False},'general_settings':{'master_key':os.environ['LITELLM_MASTER_KEY']}}))\" && litellm --config /app/config.yaml --host 0.0.0.0 --port 4000"
    expose:
      - port: 4000
        as: 80
        to:
          - global: true

  qdrant:
    image: qdrant/qdrant:latest
    expose:
      - port: 6333
        as: 6333
        to:
          - service: rag-api
            global: false
      - port: 6334
        as: 6334
        to:
          - service: rag-api
            global: false
    params:
      storage:
        qdrant-data:
          mount: /qdrant/storage
          readOnly: false

  rag-api:
    image: whyparabola/slm-rag-api:v5
    env:
      - "SGLANG_URL=http://inference:30000/v1"
      - "QDRANT_URL=http://qdrant:6333"
      - "EMBEDDING_MODEL=BAAI/bge-small-en-v1.5"
      - "GITHUB_TOKEN=<REPLACE_ME>"
      - "RAG_VERSION=6"
    expose:
      - port: 8080
        as: 8080
        to:
          - global: true

profiles:
  compute:
    inference:
      resources:
        cpu:
          units: 8
        memory:
          size: 64Gi
        gpu:
          units: 1
          attributes:
            vendor:
              nvidia:
                - model: h100
        storage:
          - size: 50Gi
          - name: models
            size: 50Gi
            attributes:
              persistent: true
              class: beta3

    litellm:
      resources:
        cpu:
          units: 2
        memory:
          size: 2Gi
        storage:
          - size: 5Gi

    qdrant:
      resources:
        cpu:
          units: 2
        memory:
          size: 4Gi
        storage:
          - size: 5Gi
          - name: qdrant-data
            size: 10Gi
            attributes:
              persistent: true
              class: beta3

    rag-api:
      resources:
        cpu:
          units: 4
        memory:
          size: 8Gi
        storage:
          - size: 10Gi

  placement:
    akash:
      pricing:
        inference:
          denom: uakt
          amount: 100000
        litellm:
          denom: uakt
          amount: 1000
        qdrant:
          denom: uakt
          amount: 1000
        rag-api:
          denom: uakt
          amount: 2000

deployment:
  inference:
    akash:
      profile: inference
      count: 1
  litellm:
    akash:
      profile: litellm
      count: 1
  qdrant:
    akash:
      profile: qdrant
      count: 1
  rag-api:
    akash:
      profile: rag-api
      count: 1

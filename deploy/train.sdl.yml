---
version: "2.0"

services:
  training:
    image: pytorch/pytorch:2.5.1-cuda12.4-cudnn9-devel
    env:
      - "HUGGING_FACE_HUB_TOKEN=<your-hf-token>"
      - "WANDB_MODE=disabled"
      - "MODEL_NAME=Qwen/Qwen3-Coder-30B-A3B"
      - "HF_HOME=/workspace/cache/huggingface"
      - "TRANSFORMERS_CACHE=/workspace/cache/huggingface"
      - "PIP_CACHE_DIR=/workspace/cache/pip"
      - "SSH_PASSWORD=<your-ssh-password>"
    # tini as PID 1: reaps zombie processes, prevents container recycling.
    # Download tini-static to /workspace/ before updating SDL:
    #   wget -O /workspace/tini-static https://github.com/krallin/tini/releases/download/v0.19.0/tini-static
    #   chmod +x /workspace/tini-static
    #   cp deploy/entrypoint.sh /workspace/entrypoint.sh
    #   touch /workspace/.auto-start-training   # enable auto-resume
    # This is a MUTABLE SDL update — won't close the lease or lose persistent storage.
    command:
      - "/workspace/tini-static"
    args:
      - "--"
      - "/bin/bash"
      - "/workspace/entrypoint.sh"
    expose:
      - port: 8888
        as: 8888
        to:
          - global: true
      - port: 22
        as: 22
        to:
          - global: true
    params:
      storage:
        workspace:
          mount: /workspace
          readOnly: false
        shm:
          mount: /dev/shm
          readOnly: false

profiles:
  compute:
    training:
      resources:
        cpu:
          units: 16
        memory:
          size: 128Gi
        gpu:
          units: 1
          attributes:
            vendor:
              nvidia:
                - model: a100
        storage:
          - size: 100Gi
          - name: workspace
            size: 200Gi
            attributes:
              persistent: true
              class: beta3
          - name: shm
            size: 1Gi
            attributes:
              class: ram
              persistent: false

  placement:
    akash:
      pricing:
        training:
          denom: uakt
          amount: 100000

deployment:
  training:
    akash:
      profile: training
      count: 1

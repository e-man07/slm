services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    env_file: .env
    restart: unless-stopped

  mcp:
    build:
      context: ../../slm-mcp
      dockerfile: Dockerfile
    environment:
      - MCP_TRANSPORT=http
      - PORT=8080
      - SLM_API_URL=https://api.sealevel.tech
      - SLM_API_KEY=${SLM_API_KEY:-}
      - CORS_ORIGIN=https://sealevel.tech
    expose:
      - "8080"
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:

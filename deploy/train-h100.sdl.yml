---
version: "2.0"

services:
  training:
    image: pytorch/pytorch:2.5.1-cuda12.4-cudnn9-devel
    env:
      - "HUGGING_FACE_HUB_TOKEN=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"
      - "HF_HOME=/workspace/cache/huggingface"
      - "TRANSFORMERS_CACHE=/workspace/cache/huggingface"
      - "PIP_CACHE_DIR=/workspace/cache/pip"
      - "WANDB_API_KEY=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"
      - "WANDB_PROJECT=slm-solana"
      - "MODEL_NAME=Qwen/Qwen3-Coder-8B-Instruct"
      - "SSH_PASSWORD=6Zw4TSX9XqqSfHooNI4n"
    command:
      - "/bin/bash"
      - "-c"
    args:
      - "set -e && apt-get update -qq && apt-get install -y -qq openssh-server git wget > /dev/null 2>&1 && mkdir -p /run/sshd && echo root:$SSH_PASSWORD | chpasswd && sed -i 's/#PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config && sed -i 's/#PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config && /usr/sbin/sshd && mkdir -p /workspace/data /workspace/checkpoints /workspace/scripts /workspace/cache/huggingface /workspace/cache/pip /workspace/venv /workspace/logs && if [ ! -f /workspace/tini-static ]; then wget -q -O /workspace/tini-static https://github.com/krallin/tini/releases/download/v0.19.0/tini-static && chmod +x /workspace/tini-static; fi && if [ ! -f /workspace/venv/pyvenv.cfg ] || ! /workspace/venv/bin/python -c 'import unsloth' 2>/dev/null; then rm -rf /workspace/venv && python -m venv /workspace/venv --system-site-packages && /workspace/venv/bin/pip install --upgrade pip && /workspace/venv/bin/pip install -q unsloth trl datasets wandb peft accelerate bitsandbytes transformers tokenizers huggingface-hub jupyterlab typer rich; fi && source /workspace/venv/bin/activate && nvidia-smi && echo '=== Sealevel Training Container Ready ===' && echo \"Model: $MODEL_NAME (8B dense)\" && echo \"GPU: $(nvidia-smi --query-gpu=name --format=csv,noheader)\" && jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token='' --NotebookApp.password='' --notebook-dir=/workspace &  echo 'Container running. SSH port 22, Jupyter port 8888.' && while true; do sleep 86400; done"
    expose:
      - port: 8888
        as: 8888
        to:
          - global: true
      - port: 22
        as: 22
        to:
          - global: true
    params:
      storage:
        workspace:
          mount: /workspace
          readOnly: false
        shm:
          mount: /dev/shm
          readOnly: false

profiles:
  compute:
    training:
      resources:
        cpu:
          units: 16
        memory:
          size: 64Gi
        gpu:
          units: 1
          attributes:
            vendor:
              nvidia:
                - model: h100
        storage:
          - size: 100Gi
          - name: workspace
            size: 200Gi
            attributes:
              persistent: true
              class: beta3
          - name: shm
            size: 1Gi
            attributes:
              class: ram
              persistent: false

  placement:
    akash:
      pricing:
        training:
          denom: uakt
          amount: 100000

deployment:
  training:
    akash:
      profile: training
      count: 1
